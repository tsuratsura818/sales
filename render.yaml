services:
  - type: web
    name: sales
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_USER_ID
        sync: false
      - key: RENDER_EXTERNAL_URL
        value: https://sales-6g78.onrender.com
