name: Keep Alive

on:
  schedule:
    # 14分間隔（Renderの15分スリープ閾値より短い）
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 https://sales-6g78.onrender.com/health 2>/dev/null)
            if [ "$STATUS" = "200" ]; then
              echo "Ping OK (attempt $i): HTTP $STATUS"
              exit 0
            fi
            echo "Ping failed (attempt $i): HTTP $STATUS - retrying in 30s..."
            sleep 30
          done
          echo "All ping attempts failed"
          exit 1
